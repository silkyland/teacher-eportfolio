services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: teacher-eportfolio-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: teacher_eportfolio
      DB_USERNAME: teacher
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - teacher-net

  nginx:
    image: nginx:1.27-alpine
    container_name: teacher-eportfolio-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - teacher-net

  mysql:
    image: mysql:8.4
    container_name: teacher-eportfolio-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: teacher_eportfolio
      MYSQL_USER: teacher
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - teacher-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - teacher-net

  node:
    image: node:22-alpine
    container_name: teacher-eportfolio-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run build"
    profiles:
      - build
    networks:
      - teacher-net

networks:
  teacher-net:
    driver: bridge

volumes:
  teacher-mysql-data:
